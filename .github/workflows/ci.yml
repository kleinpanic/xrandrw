name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Ruff (lint)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "ruff==0.15.*"
          ruff check .

  deadcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Vulture (dead-code, config in pyproject [tool.vulture])
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "vulture>=2.11"
          vulture

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test suite + build (in venv)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[test]" build
          python -c "import xrandrw.cli"   # import-safety smoke
          pytest -q
          python -m build
