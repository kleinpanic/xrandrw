name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Ruff (lint)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "ruff==0.15.*"
          ruff check .

  lint-strict:
    # CI-02/CI-04: additive expanded-ruff gate. WIDENED (CI-04) from the three
    # window-mgmt modules to ALL of src/xrandrw/. The former deferral (~187 hits,
    # mostly UP annotation-modernization on shipped v0.1.0 code) is now CLOSED:
    # plan 14-03 ran a one-pass `ruff --fix UP,RUF,SIM` across src/ and moved the
    # few knowingly-accepted C901/PERF203 hits to [tool.ruff.lint.per-file-ignores]
    # in pyproject. The baseline `lint` job (ruff check .) above stays byte-unchanged.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Ruff (expanded ruleset, all of src/xrandrw/)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "ruff==0.15.*"
          ruff check --select B,SIM,PERF,C90,UP,RUF src/xrandrw/

  dupcode:
    # CI-04: duplicate-code detector (pylint R0801). min-similarity-lines=6 avoids
    # R0801's default short-block noise (RESEARCH Pitfall 6). The one real finding --
    # apply.py's two near-identical primary/no-internal placement branches -- was
    # resolved in plan 14-03 by extracting the shared `_place_externals` helper
    # (behavior-preserving, golden-log-proven).
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Pylint (duplicate-code R0801)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "pylint==4.0.*"
          pylint --disable=all --enable=duplicate-code --min-similarity-lines=6 src/xrandrw

  deadcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Vulture (dead-code, config in pyproject [tool.vulture])
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "vulture>=2.11"
          vulture

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # TEST-03/TEST-07 gate + TEST-04 headless evidence. This runs the entire
      # suite -- including the fake-AF_UNIX dwm-ipc server, the mocked-Xlib seam,
      # and the fake-/proc functional tests -- with NO X server, NO dwm, and NO
      # HDMI attached. TWO gates run:
      #   (1) SCOPED gate: the three window-mgmt modules (dwmipc/windows/relocate),
      #       LINE-based (NO --cov-branch), raised from 90 -> 95 (measured 97.07%).
      #       Kept LINE-only on purpose (M5): enabling branch here could fail
      #       95-100%-LINE modules on untouched branches -- see [tool.coverage.run]
      #       in pyproject (branch is NOT set globally).
      #   (2) WHOLE-PACKAGE ratchet: `--cov-branch --cov-fail-under=85`. 85 is the
      #       honest LINE ratchet floor (whole-package LINE was 83% before plan
      #       14-02, now 91.12%). Branch is MEASURED here at 82.75% (combined
      #       line+branch = 89.19%), reported but not aspirationally floored.
      # The plain multi-version `test` matrix stays on bare `pytest -q` so the
      # coverage plugin never gates it; the floors are enforced here on one Python.
      - name: Coverage gate (scoped LINE >=95; whole-package ratchet --cov-branch --cov-fail-under=85)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[test]"
          # (1) scoped LINE gate -- no --cov-branch
          pytest --cov=xrandrw.dwmipc --cov=xrandrw.windows --cov=xrandrw.relocate --cov-report=term-missing --cov-fail-under=95
          # (2) whole-package ratchet -- LINE floor 85, branch measured/reported
          pytest --cov=xrandrw --cov-branch --cov-report=term-missing --cov-fail-under=85

  cli-smoke:
    # CI-03: prove the INSTALLED console-script actually runs -- `pip install .`
    # (a real build+install, not editable) then invoke the real `xrandrw` entry
    # point, asserting exit 0. This catches packaging/entry-point regressions that
    # `import xrandrw.cli` alone cannot. Read-only flags only: `--list-state` and
    # `--window-state` are X-independent; `--print` (xrandr --query) needs a
    # display, so it runs under a THROWAWAY Xvfb via `xvfb-run -a` (auto display
    # >= :99, never the user's :0). `--daemon`/`--watch` are NEVER smoked (they
    # block). T-14-04/T-14-11: `permissions: contents: read`, no secrets, no
    # blocking modes.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Xvfb + xrandr client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb x11-xserver-utils
      - name: pip install . and run the real console-script (exit 0)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install .
          # X-independent read-only diagnostics:
          xrandrw --list-state
          xrandrw --window-state
          # --print shells out to `xrandr --query`; give it a throwaway X server:
          xvfb-run -a xrandrw --print

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test suite + build (in venv)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[test]" build
          python -c "import xrandrw.cli"   # import-safety smoke
          pytest -q
          python -m build

  functional:
    # TEST-05 L1 (GATING): real dwm-ipc-patched dwm + a real PRIVATE dwm.sock,
    # driven headlessly on a PLAIN runner (NO root, NO Xorg, NO dummy driver, NO
    # tty). Two side-by-side Xinerama heads are provided by a headless Xephyr
    # nested inside a plain Xvfb (the RandR-1.6 `xrandr --setmonitor` -> Xinerama
    # bridge is unreliable on hosted Xvfb), so real dwm sees >= 2 monitors and the
    # full control+capture path + injected record/restore run against reality.
    # M2 no-vacuous-green: $GITHUB_ACTIONS is set on the runner, so the conftest
    # policy turns any X/dwm launch failure into an ERROR (never a skip) and
    # `test_functional_floor` fails the job if 0 functional tests were collected.
    # The harness builds its own dwm from the vendored, checksum-pinned
    # dwm-ipc.diff (links libyajl -> libyajl-dev/libyajl2 below, M4).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install X (Xvfb+Xephyr) + xterm + dwm build deps (incl. libyajl-dev)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb xserver-xephyr x11-xserver-utils x11-utils xterm \
            build-essential libx11-dev libxft-dev libxinerama-dev \
            libfontconfig1-dev libyajl-dev libyajl2
      - name: Cache the built harness dwm (keyed on diff + config.h)
        uses: actions/cache@v4
        with:
          path: .dwm-build-cache
          key: dwm-ipc-${{ hashFiles('tests/functional/dwm/dwm-ipc.diff', 'tests/functional/dwm/config.h') }}
      - name: Run L1 functional suite (gating; launch failure ERRORs, never skips)
        env:
          DWM_BUILD_CACHE: ${{ github.workspace }}/.dwm-build-cache
        run: |
          mkdir -p "$DWM_BUILD_CACHE"
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[test,wallpaper]"
          pytest -m functional tests/functional -v

  functional-vkms:
    # TEST-05 L2 (NON-gating): best-effort attempt at a TRUE output-status flip
    # via real Xorg + xf86-video-dummy (tests/functional/dummy-2head.conf) and/or
    # VKMS. Under the dummy driver outputs are ALWAYS Connected (xrandr.py:53), so
    # a real removed/returned set still cannot be produced headlessly; this job
    # documents the gap and never gates (the true unplug chain is proven only by
    # the live L3 HDMI verify, plan 14-05). continue-on-error keeps it advisory.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install real Xorg + dummy driver + dwm build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xserver-xorg-core xserver-xorg-video-dummy x11-xserver-utils x11-utils xterm \
            build-essential libx11-dev libxft-dev libxinerama-dev \
            libfontconfig1-dev libyajl-dev libyajl2
      - name: Best-effort real-Xorg+dummy / VKMS true-output-flip probe (advisory)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[test,wallpaper]"
          # Real Xorg with the dummy driver commonly needs root/tty and may fail
          # "no screens found" on hosted runners -- hence this job is advisory.
          sudo Xorg -config "$PWD/tests/functional/dummy-2head.conf" :99 \
            >/tmp/xorg-dummy.log 2>&1 &
          sleep 3
          sudo modprobe vkms || true   # true connector hotplug is root/VKMS-gated
          DISPLAY=:99 xrandr --query || true
          echo "L2 is documentary/non-gating; see tests/functional/README.md"
