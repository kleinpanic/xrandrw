name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Ruff (lint)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "ruff==0.15.*"
          ruff check .

  deadcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Vulture (dead-code, config in pyproject [tool.vulture])
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "vulture>=2.11"
          vulture

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # TEST-03 gate + TEST-04 headless evidence. This SINGLE run executes the
      # entire test suite -- including the fake-AF_UNIX dwm-ipc server, the
      # mocked-Xlib seam, and the fake-/proc functional tests -- with NO X server,
      # NO dwm, and NO HDMI attached, then FAILS the build if combined coverage of
      # the three new window-mgmt modules drops below 90%. The plain multi-version
      # `test` matrix stays on bare `pytest -q` so the coverage plugin never gates
      # it; the floor is enforced here on a single Python version.
      - name: Coverage gate (new window-mgmt modules, --cov-fail-under=90)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[test]"
          pytest --cov=xrandrw.dwmipc --cov=xrandrw.windows --cov=xrandrw.relocate --cov-report=term-missing --cov-fail-under=90

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test suite + build (in venv)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[test]" build
          python -c "import xrandrw.cli"   # import-safety smoke
          pytest -q
          python -m build
