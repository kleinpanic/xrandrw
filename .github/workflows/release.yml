name: Release

# Publishing a GitHub Release (on a v* tag) builds the artifacts, attaches them to
# the release, and publishes to PyPI via the PYPI_API_TOKEN repo secret. Token auth
# (not Trusted Publishing) keeps it self-contained. `--skip-existing` makes re-runs
# idempotent so a re-published release never fails on an already-uploaded version.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Gate on the L3 live-hardware verify stamp
        # TEST-05/CD-03: the window-management relocate/restore path can only be
        # proven by a REAL physical unplug/replug against a REAL dwm -- no CI
        # runner can flip a connector's hotplug-detect bit, and `xrandr --off`
        # does NOT simulate it (HPD stays connected, so the daemon just re-lights
        # the head inside one apply). The committed stamp is the record that a
        # human ran that verification against this codebase. Two live attempts
        # FAILED before the fix landed, so this gate is not ceremony: without it
        # a release could ship a relocate path no one ever exercised on metal.
        run: |
          test -f tests/functional/L3_PASS.stamp || {
            echo "::error::tests/functional/L3_PASS.stamp is missing -- the live" \
                 "2-monitor hardware verify has not been recorded for this release." >&2
            exit 1
          }
          echo "L3 live-verify stamp present:"
          sed -n '1,8p' tests/functional/L3_PASS.stamp
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build + verify tag matches version (in venv)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install build
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag" != "$version" ]; then
            echo "Release tag v$tag does not match pyproject version $version" >&2
            exit 1
          fi
          python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - name: Attach built artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - name: Publish to PyPI (token, in venv)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install twine
          twine upload --skip-existing dist/*
