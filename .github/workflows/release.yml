name: Release

# Publishing ANY GitHub Release builds the artifacts, attaches them to the release,
# and publishes to PyPI via the PYPI_API_TOKEN repo secret. The trigger is
# `release: types: [published]` -- it is NOT restricted to v* tags, and the version
# is derived from the release's tag name with a leading `v` stripped if present
# (`${GITHUB_REF_NAME#v}`), so both `v0.2.0` and a bare `0.2.0` are accepted. Token auth
# (not Trusted Publishing) keeps it self-contained. `--skip-existing` makes re-runs
# idempotent so a re-published release never fails on an already-uploaded version.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # REQUIRED by the stamp gate below: it does ancestry (`merge-base
          # --is-ancestor`) and diff checks against the stamped commit, which a
          # shallow clone cannot see. Do not lower this.
          fetch-depth: 0
      - name: Gate on the L3 live-hardware verify stamp (freshness, not existence)
        # TEST-05/CD-03. This gate used to be `test -f <stamp>` -- existence only.
        # That is worse than no gate: it passes forever, on any future commit, no
        # matter how far the code has drifted from what was actually verified on
        # hardware. ci/check_l3_stamp.sh replaces it with a real freshness check
        # (release-version match, ancestry, and src/xrandrw/ drift, with a
        # sha-pinned human waiver as the only escape hatch). The full rationale
        # and the drift policy live in that script's header.
        run: ci/check_l3_stamp.sh
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build + verify tag matches version (in venv)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install build
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag" != "$version" ]; then
            echo "Release tag v$tag does not match pyproject version $version" >&2
            exit 1
          fi
          python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - name: Attach built artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - name: Publish to PyPI (token, in venv)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install twine
          twine upload --skip-existing dist/*
