# xrandrw L2 functional-vkms harness -- xf86-video-dummy 2-head Xorg config
# ---------------------------------------------------------------------------
# Used ONLY by the NON-gating `functional-vkms` CI job (real Xorg + dummy
# driver), never by the gating L1 `functional` job (which runs on PLAIN Xvfb
# and needs no Xorg/dummy/root). Launch as:
#
#     Xorg -config tests/functional/dummy-2head.conf :99
#
# Why this exists: the dummy driver gives a real Xorg RandR 1.5 tree that a
# `--setmonitor`-free path can carve into two heads. HONESTY NOTE (see
# tests/functional/README.md): xf86-video-dummy outputs are ALWAYS `Connected`
# (xrandr.py:53), so `--off/--auto/--setmonitor` here STILL never produce the
# daemon's removed/returned output sets -- a TRUE output-status flip needs VKMS
# (best-effort, root-gated) or the L3 live-HDMI verify (plan 14-05). This job is
# `continue-on-error: true` and does not gate the build.

Section "Device"
    Identifier  "dummy-device"
    Driver      "dummy"
    VideoRam    256000
    # Two virtual CRTC/output heads so the dummy screen can host >=2 monitors.
    Option      "VirtualHeads" "2"
EndSection

Section "Monitor"
    Identifier  "dummy-monitor"
    HorizSync   5.0-1000.0
    VertRefresh 5.0-200.0
    # One wide 3840x1080 mode; the two 1920x1080 heads tile side-by-side within it.
    Modeline    "3840x1080" 296.62 3840 4056 4464 5120 1080 1081 1084 1096
EndSection

Section "Screen"
    Identifier  "dummy-screen"
    Device      "dummy-device"
    Monitor     "dummy-monitor"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "3840x1080"
        # Virtual canvas wide enough for two 1920-wide heads.
        Virtual 3840 1080
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier  "dummy-layout"
    Screen      "dummy-screen"
EndSection
